name: skillshare
description: A Flutter app for skilled professionals to showcase their work and connect with customers.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  
  # State Management
  provider: ^6.1.1
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  
  # Image Handling & Upload
  image_picker: ^1.0.5
  cloudinary_public: ^0.21.0
  http: ^1.1.0
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Chat
  intl: ^0.18.1
  
  # Biometric / local auth
  local_auth: ^2.3.0

  # Utils
  url_launcher: ^6.2.2
  share_plus: ^10.0.3
  matrix_gesture_detector: ^0.2.0-nullsafety.1
  pdf: ^3.11.3
  super_clipboard: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: SourceSerif4
      fonts:
        - asset: Source_Serif_4/static/SourceSerif4-ExtraLight.ttf
          weight: 200
        - asset: Source_Serif_4/static/SourceSerif4-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-Light.ttf
          weight: 300
        - asset: Source_Serif_4/static/SourceSerif4-LightItalic.ttf
          weight: 300
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-Regular.ttf
          weight: 400
        - asset: Source_Serif_4/static/SourceSerif4-Italic.ttf
          weight: 400
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-Medium.ttf
          weight: 500
        - asset: Source_Serif_4/static/SourceSerif4-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-SemiBold.ttf
          weight: 600
        - asset: Source_Serif_4/static/SourceSerif4-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-Bold.ttf
          weight: 700
        - asset: Source_Serif_4/static/SourceSerif4-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-ExtraBold.ttf
          weight: 800
        - asset: Source_Serif_4/static/SourceSerif4-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-Black.ttf
          weight: 900
        - asset: Source_Serif_4/static/SourceSerif4-BlackItalic.ttf
          weight: 900
          style: italic
