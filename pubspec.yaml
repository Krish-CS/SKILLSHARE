name: skillshare
description: A Flutter app for skilled professionals to showcase their work and connect with customers.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^7.2.0
  
  # State Management
  provider: ^6.1.5
  
  # UI Components
  cupertino_icons: ^1.0.9
  google_fonts: ^8.0.2
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  flutter_svg: ^2.2.4
  
  # Image Handling & Upload
  image_picker: ^1.2.1
  cloudinary_public: ^0.23.1
  http: ^1.5.0
  connectivity_plus: ^7.1.0
  
  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  
  # Chat
  intl: ^0.20.2
  
  # Biometric / local auth
  local_auth: ^3.0.1
  shared_preferences: ^2.5.5
  crypto: ^3.0.7

  # Utils
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  matrix_gesture_detector: ^0.2.0-nullsafety.1
  pdf: ^3.12.0
  super_clipboard: ^0.9.1
  file_picker: ^10.3.10
  csv: ^8.0.0
  excel: ^4.0.6
  archive: ^3.6.1
  xml: ^6.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf
    - family: SourceSerif4
      fonts:
        - asset: Source_Serif_4/static/SourceSerif4-ExtraLight.ttf
          weight: 200
        - asset: Source_Serif_4/static/SourceSerif4-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-Light.ttf
          weight: 300
        - asset: Source_Serif_4/static/SourceSerif4-LightItalic.ttf
          weight: 300
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-Regular.ttf
          weight: 400
        - asset: Source_Serif_4/static/SourceSerif4-Italic.ttf
          weight: 400
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-Medium.ttf
          weight: 500
        - asset: Source_Serif_4/static/SourceSerif4-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-SemiBold.ttf
          weight: 600
        - asset: Source_Serif_4/static/SourceSerif4-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-Bold.ttf
          weight: 700
        - asset: Source_Serif_4/static/SourceSerif4-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-ExtraBold.ttf
          weight: 800
        - asset: Source_Serif_4/static/SourceSerif4-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: Source_Serif_4/static/SourceSerif4-Black.ttf
          weight: 900
        - asset: Source_Serif_4/static/SourceSerif4-BlackItalic.ttf
          weight: 900
          style: italic
