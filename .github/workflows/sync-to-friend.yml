name: Sync to Friend's Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false # CRITICAL FIX: Prevents using the default GitHub bot token

      - name: Push to Friend's Repository
        run: |
          git remote add friend "https://ARON08-AJ:${{ secrets.FRIEND_TOKEN }}@github.com/ARON08-AJ/SKILLSHARE.git"
          git push friend main --force
